<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#08101F"/>
  <!-- Clock face -->
  <circle cx="16" cy="16" r="12" fill="#F6F5F2"/>
  <!-- Clock rim -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#08101F" stroke-width="1.5"/>
  <!-- Hour markers -->
  <line x1="16" y1="5.5" x2="16" y2="7" stroke="#08101F" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26.5" y1="16" x2="25" y2="16" stroke="#08101F" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="26.5" x2="16" y2="25" stroke="#08101F" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="5.5" y1="16" x2="7" y2="16" stroke="#08101F" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Hour hand pointing to 10 (fall back) -->
  <line x1="16" y1="16" x2="10.5" y2="10.5" stroke="#08101F" stroke-width="2" stroke-linecap="round"/>
  <!-- Minute hand pointing to 12 -->
  <line x1="16" y1="16" x2="16" y2="7.5" stroke="#08101F" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#0057FF"/>
  <!-- Blue down arrow at bottom right -->
  <circle cx="24" cy="24" r="6" fill="#0057FF"/>
  <polyline points="24,20.5 24,27" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
  <polyline points="21.5,24.5 24,27.5 26.5,24.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
